services:
  # ── Backend — Node.js API ──────────────────────────────────
  - type: web
    name: sosal-backend
    runtime: node
    plan: free
    rootDir: Backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: APP_URL
        value: https://sosal-backend.onrender.com
      - key: CLIENT_URL
        value: https://sosal-frontend.onrender.com
      # ⚠️ Set these manually in Render Dashboard → Environment
      - key: MONGO_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: ADMIN_EMAIL
        sync: false
    healthCheckPath: /api/health

  # ── Frontend — Static Site ─────────────────────────────────
  - type: web
    name: sosal-frontend
    runtime: static
    rootDir: Frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://sosal-backend.onrender.com/api
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
