services:
  # ── Backend — Node.js API ──────────────────────────────────
  - type: web
    name: sosal-backend
    runtime: node
    rootDir: Backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MONGO_URL
        sync: false          # set manually in Render dashboard
      - key: JWT_SECRET
        sync: false          # set manually in Render dashboard
      - key: CLIENT_URL
        fromService:
          name: sosal-frontend
          type: web
          property: host
          format: https://{host}
      - key: APP_URL
        fromService:
          name: sosal-backend
          type: web
          property: host
          format: https://{host}
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: ADMIN_EMAIL
        sync: false
    healthCheckPath: /api/health

  # ── Frontend — React/Vite Static Site ─────────────────────
  - type: web
    name: sosal-frontend
    runtime: static
    rootDir: Frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: sosal-backend
          type: web
          property: host
          format: https://{host}/api
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false          # set manually in Render dashboard
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
